<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Horarios | Esto es el Futuro</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<div class="future-assistant">
  <button class="future-assistant-toggle" id="assistantToggle">☺</button>

  <div class="future-assistant-panel" id="assistantPanel">
    <div class="future-assistant-top">
      <div>
        <span>FUTURE ASSISTANT</span>
        <h3>Tu pedido</h3>
      </div>

      <button id="assistantClose">×</button>
    </div>

    <p class="future-assistant-message">
      Estoy acá para ayudarte a armar tu experiencia sin pensar de más.
    </p>

    <div class="future-assistant-items" id="assistantItems">
      <p class="empty-cart">Tocá productos para sumarlos.</p>
    </div>

    <div class="future-assistant-total">
      <span>Total estimado</span>
      <strong id="assistantTotal">$0</strong>
    </div>

    <button class="future-assistant-order" id="assistantOrder">
      Armar pedido
    </button>

    <button class="future-assistant-reset" id="assistantReset">
      Reiniciar
    </button>
  </div>
</div>

<body>

<div class="stars"></div>
<div class="particles"></div>
<div class="mouse-glow"></div>
<div class="noise"></div>
<div class="blue-glow"></div>

<header class="page-nav">
  <a href="index.html">← Volver</a>
</header>

<section class="time-universe">

  <span class="hero-tag">UNIVERSO 05 • HORARIOS</span>

  <h1>CUÁNDO<br>VENIR</h1>

  <div class="time-grid">

    <div class="time-card">
      <span>LUNES A JUEVES</span>
      <h2>16:00</h2>
      <p>hasta</p>
      <h2>03:00</h2>
    </div>

    <div class="time-card featured-time">
      <span>VIERNES Y SÁBADOS</span>
      <h2>10:00</h2>
      <p>hasta</p>
      <h2>05:00</h2>
    </div>

    <div class="time-card">
      <span>DOMINGOS</span>
      <h2>10:00</h2>
      <p>hasta</p>
      <h2>03:00</h2>
    </div>

  </div>

</section>

<script src="app.js"></script>
</body>
</html>
