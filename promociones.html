<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Promociones | Esto es el Futuro</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="stars"></div>
<div class="particles"></div>
<div class="mouse-glow"></div>
<div class="noise"></div>
<div class="blue-glow"></div>

<header class="page-nav">
  <a href="index.html">← Volver</a>
</header>

<section class="promo-universe">

  <span class="hero-tag">UNIVERSO 04 • PROMOCIONES</span>

  <h1>
    PROMOS<br>
    ACTIVAS
  </h1>

  <div class="promo-main">
    <span>🔥 PROMO DE HOY</span>

    <h2>2x1 EN TRAGOS</h2>

    <p>
      Promoción disponible por tiempo limitado.
    </p>

    <div class="countdown">
      <div>
        <strong id="hours">00</strong>
        <small>Horas</small>
      </div>

      <div>
        <strong id="minutes">00</strong>
        <small>Min</small>
      </div>

      <div>
        <strong id="seconds">00</strong>
        <small>Seg</small>
      </div>
    </div>

    <a class="reserve-btn" href="drinks.html">
      Ver drinks
    </a>
  </div>

  <div class="promo-grid">

    <div class="promo-card">
      <span>🍔 FOOD</span>
      <h2>Burger Night</h2>
      <p>Burger + papas + pinta.</p>
    </div>

    <div class="promo-card">
      <span>🍺 HAPPY HOUR</span>
      <h2>18 a 20 hs</h2>
      <p>Promos especiales para arrancar la noche.</p>
    </div>

  </div>

</section>

<script src="app.js"></script>
</body>
</html>
