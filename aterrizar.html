<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aterrizar | Club Serrano</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body class="landing-body">

<div class="stars"></div>
<div class="particles"></div>
<div class="mouse-glow"></div>
<div class="noise"></div>
<div class="blue-glow"></div>

<header class="page-nav">
  <a href="index.html">← Volver</a>
</header>

<section class="gta-travel">

  <div class="travel-stage stage-1 active">
    <span>INICIANDO VIAJE</span>
    <h1>ESPACIO</h1>
    <p>Detectando destino...</p>
  </div>

  <div class="travel-stage stage-2">
    <span>ENTRANDO A LA CIUDAD</span>
    <h1>BUENOS AIRES</h1>
    <p>Ubicando zona Palermo...</p>
  </div>

  <div class="travel-stage stage-3">
    <span>DESTINO FIJADO</span>
    <h1>CLUB SERRANO</h1>
    <p>Serrano 1551 · Palermo</p>
  </div>

  <div class="map-orbit">
    <div class="earth"></div>
    <div class="zoom-ring ring-a"></div>
    <div class="zoom-ring ring-b"></div>
    <div class="location-pin">📍</div>
  </div>

  <div class="arrival-card">
    <span>ATERRIZAJE COMPLETADO</span>
    <h2>Serrano 1551</h2>
    <p>Palermo · Buenos Aires</p>

    <a 
      class="gps-btn"
      href="https://www.google.com/maps/search/?api=1&query=Serrano+1551+Palermo+Buenos+Aires"
      target="_blank">
      ABRIR GPS
    </a>
  </div>

</section>

<script src="app.js"></script>

</body>
</html>
